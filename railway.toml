[build]
builder = "DOCKERFILE"

[[services]]
name = "backend"
source = "backend"
dockerfile = "Dockerfile"

[services.deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port 8000"
healthcheckPath = "/api/status"
healthcheckTimeout = 300

[[services.variables]]
name = "MODEL_DIR"
value = "./saved_models"

[[services.variables]]
name = "DATA_DIR"
value = "./data"

[[services.variables]]
name = "DATABASE_URL"
value = "sqlite:///./fraud_detection.db"

[[services]]
name = "frontend"
source = "frontend"
dockerfile = "Dockerfile"

[services.deploy]
startCommand = "serve -s dist -l 3001"
