[build]
builder = "NIXPACKS"

[deploy]
startCommand = "PYTHONPATH=/app uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/status"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Railway environment variables to set in the dashboard ─────────────────────
# MODEL_DIR      = /app/saved_models
# DATA_DIR       = /app/data
# DATABASE_URL   = sqlite:////app/data/fraud_detection.db
# UPLOAD_SECRET  = <strong random string>
#
# ── Railway Volume ─────────────────────────────────────────────────────────────
# Mount a Volume at /app/saved_models so model files survive redeploys.
# Dashboard → your backend service → Volumes → Add Volume → Mount: /app/saved_models
