version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_models:/app/saved_models
    environment:
      - MODEL_DIR=./saved_models
      - DATA_DIR=./data
      - DATABASE_URL=sqlite:///./fraud_detection.db
      - FRONTEND_URL=http://localhost:3001
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    ports:
      - "3001:3001"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_models:
